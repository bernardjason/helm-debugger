nameOverride: ""
fullnameOverride: ""

replicaCount: 1

testIf:
  condition: hello

image:
  repository: nginx
  tag: "1.27.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

config:
  logLevel: info
  featureFlags:
    audit: true
    metrics: false

labels: {}

requiredValue: "this value is required"

enabled: true

env: dev

podAnnotations: {}

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

someTemplate: 'templated-value={{ .Values.env }}'
jsonString: '{"hello":"world","n":123}'

mapData:
  my-key: "my-value"

featureFlag: true
numberString: "42"
floatString: "3.14"

semverTarget: ">=1.20.0"
